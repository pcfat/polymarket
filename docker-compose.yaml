version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: polymarket-backend
    restart: always
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./data:/app/data
      - ./backend/config:/app/config
    networks:
      - polymarket-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: polymarket-frontend
    restart: always
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - polymarket-network

  nginx:
    image: nginx:alpine
    container_name: polymarket-nginx
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - backend
      - frontend
    networks:
      - polymarket-network

networks:
  polymarket-network:
    driver: bridge

volumes:
  data:
